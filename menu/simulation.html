        html,body,#canvas,canvas {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none
        }

        canvas {
            background: #000;
            pointer-events: none
        }

        #pw-spawn-ad {
            background: #111 url("https://cdn.discordapp.com/attachments/1022836859774173238/1501955585363411085/image.jpg?ex=69fdf4a4&is=69fca324&hm=defbee81c543cba0a9fa9355b85cdeea5427f3564cd15dd18882a6299e5abb03&animated=true") center/cover no-repeat !important;
        }

        #pw-spawn-ad > :not(.custom-spawn-ad-image) {
            display: none !important;
            visibility: hidden !important;
        }
    </style>
    <body>
        <script>
            // Player name stuff here
            if (!localStorage.player_name) localStorage.player_name = "";
            const SERVER_PROTOCOLS = ["arras.io#v1.4+sls+et0", "arras.io"];
            const buildProxySocketUrl = targetUrl => {
                let protocol = location.protocol === "https:" ? "wss:" : "ws:";
                return `${protocol}//${location.host}/game-proxy?target=${encodeURIComponent(targetUrl)}`;
            };

            (() => {
                const blocked_domains = [
                    "doubleclick.net",
                    "googlesyndication.com",
                    "adservice.google.com",
                    "ads.pubmatic.com",
                    "pagead2.googlesyndication.com",
                    "adnxs.com",
                    "criteo.com",
                    "taboola.com"
                ];
                const is_blocked_ad_url = value => {
                    try {
                        let url = value?.url ?? value;
                        return blocked_domains.some(domain => String(url || "").includes(domain));
                    } catch (error) {
                        return false;
                    }
                };
                const native_fetch = window.fetch;
                window.fetch = (...args) => {
                    if (is_blocked_ad_url(args[0])) return Promise.reject(new TypeError("Blocked"));
                    return native_fetch.apply(window, args);
                };
                const native_open = XMLHttpRequest.prototype.open;
                const native_send = XMLHttpRequest.prototype.send;
                XMLHttpRequest.prototype.open = function(method, url, ...rest) {
                    this._arras_ad_request_blocked = is_blocked_ad_url(url);
                    if (!this._arras_ad_request_blocked) native_open.call(this, method, url, ...rest);
                };
                XMLHttpRequest.prototype.send = function(...args) {
                    if (!this._arras_ad_request_blocked) native_send.apply(this, args);
                };
            })();

            const CUSTOM_SPAWN_AD_IMAGE_URL = "https://cdn.discordapp.com/attachments/1022836859774173238/1501955585363411085/image.jpg?ex=69fdf4a4&is=69fca324&hm=defbee81c543cba0a9fa9355b85cdeea5427f3564cd15dd18882a6299e5abb03&animated=true";
            let custom_spawn_ad_preload = new Image();
            custom_spawn_ad_preload.decoding = "async";
            custom_spawn_ad_preload.loading = "eager";
            custom_spawn_ad_preload.fetchPriority = "high";
            custom_spawn_ad_preload.src = CUSTOM_SPAWN_AD_IMAGE_URL;

            function is_custom_spawn_ad_ready(ad) {
                let image = ad?.firstElementChild;
                let expected_src = new URL(CUSTOM_SPAWN_AD_IMAGE_URL, document.baseURI).href;
                return ad?.dataset.customSpawnAd === "true"
                    && ad.children.length === 1
                    && image?.tagName === "IMG"
                    && image.src === expected_src;
            }

            function replace_spawn_ad_with_custom_image() {
                let ad = document.getElementById("pw-spawn-ad");
                if (!ad || is_custom_spawn_ad_ready(ad)) return;
                ad.dataset.customSpawnAd = "true";
                ad.textContent = "";
                let image = document.createElement("img");
                image.className = "custom-spawn-ad-image";
                image.src = CUSTOM_SPAWN_AD_IMAGE_URL;
                image.alt = "";
                image.draggable = false;
                image.decoding = "async";
                image.loading = "eager";
                image.fetchPriority = "high";
                Object.assign(image.style, {
                    width: "100%",
                    height: "100%",
                    display: "block",
                    objectFit: "cover",
                    pointerEvents: "none"
                });
                ad.appendChild(image);
            }

            function start_custom_spawn_ad_replacer() {
                replace_spawn_ad_with_custom_image();
                let observer = new MutationObserver(replace_spawn_ad_with_custom_image);
                observer.observe(document.documentElement, {
                    childList: true,
                    subtree: true
                });
            }

            start_custom_spawn_ad_replacer();
            (async () => {
                let middle_ws = new WebSocket('ws://localhost:8080');
                middle_ws.binaryType = 'arraybuffer';
                let remote_overlay_observers = {};
                const CONTROL_MENU_PREFERENCES_STORAGE_KEY = "arras_control_menu_preferences_v1";

                function sanitize_control_menu_preferences(raw = {}) {
                    let bot_count = Number.parseInt(raw?.bots?.count, 10);
                    let chat_interval = Number.parseInt(raw?.chat?.interval_seconds, 10);
                    let custom_bots = raw?.bots?.customBots || {};
                    let legacy_custom_tank_path = typeof raw?.bots?.customTankPath === "string" ? raw.bots.customTankPath : "";
                    let custom_mode = String(custom_bots.mode || "normal").toLowerCase() === "ar" ? "ar" : "normal";
                    return {
                        bots: {
                            count: Number.isFinite(bot_count) ? Math.max(1, bot_count) : 30,
                            names: typeof raw?.bots?.names === "string" ? raw.bots.names : "",
                            pathfinding: raw?.bots?.pathfinding === true,
                            autofire: raw?.bots?.autofire !== false,
                            copyShooting: raw?.bots?.copyShooting === true,
                            preset: typeof raw?.bots?.preset === "string" ? raw.bots.preset : "",
                            customTankPath: typeof raw?.bots?.customTankPath === "string" ? raw.bots.customTankPath : "",
                            customBots: {
                                enabled: custom_bots.enabled === true || legacy_custom_tank_path.length > 0,
                                mode: custom_mode,
                                tanks: typeof custom_bots.tanks === "string" ? custom_bots.tanks : legacy_custom_tank_path,
                                builds: typeof custom_bots.builds === "string" ? custom_bots.builds : ""
                            },
                            extendedControl: raw?.bots?.extendedControl !== false
                        },
                        focusFire: raw?.focusFire === true,
                        chat: {
                            message: typeof raw?.chat?.message === "string" ? raw.chat.message.slice(0, 60) : "",
                            interval_seconds: Number.isFinite(chat_interval) ? Math.max(1, Math.min(10, chat_interval)) : 3
                        }
                    };
                }

                function load_control_menu_preferences() {
                    try {
                        return sanitize_control_menu_preferences(JSON.parse(localStorage.getItem(CONTROL_MENU_PREFERENCES_STORAGE_KEY) || "{}"));
                    } catch (error) {
                        return sanitize_control_menu_preferences();
                    }
                }

                function save_control_menu_preferences(next_preferences = saved_control_menu_preferences) {
                    saved_control_menu_preferences = sanitize_control_menu_preferences(next_preferences);
                    try {
                        localStorage.setItem(CONTROL_MENU_PREFERENCES_STORAGE_KEY, JSON.stringify(saved_control_menu_preferences));
                    } catch (error) {}
                }

                let saved_control_menu_preferences = load_control_menu_preferences();
                let bot_extended_control = saved_control_menu_preferences.bots.extendedControl;
                let control_menu_state = {
                    bots: {
                        running: false,
                        active: 0,
                        count: saved_control_menu_preferences.bots.count,
                        names: saved_control_menu_preferences.bots.names,
                        pathfinding: saved_control_menu_preferences.bots.pathfinding,
                        autofire: saved_control_menu_preferences.bots.autofire,
                        copyShooting: saved_control_menu_preferences.bots.copyShooting,
                        preset: saved_control_menu_preferences.bots.preset,
                        customTankPath: saved_control_menu_preferences.bots.customTankPath,
                        customBots: saved_control_menu_preferences.bots.customBots,
                        extendedControl: saved_control_menu_preferences.bots.extendedControl,
                        presets: [],
                        server: ""
                    },
                    fov: {
                        observersRunning: false,
                        observerCount: 0,
                        teamLinks: []
                    },
                    teamlink: {
                        running: false,
                        server: "",
                        expectedTeams: null,
                        spawned: 0,
                        active: 0,
                        teams: [],
                        messages: []
                    },
                    mapper: {
                        running: false,
                        server: "",
                        active: 0,
                        queued: 0,
                        mapped: 0,
                        terminals: 0,
                        outputFile: "",
                        messages: []
                    },
                    notice: ""
                };
                let pending_control_packets = [];
                let sent_saved_control_preferences_to_backend = false;
                const control_packet_encoder = new TextEncoder();
                const control_packet_decoder = new TextDecoder();
                const CHAT_PACKET_LOG_LIMIT = 200;
                const UPGRADE_MENU_LOG_LIMIT = 200;
                const chat_packet_log_decoder = new TextDecoder();
                let chat_packet_log_entries = [];
                let upgrade_menu_log_entries = [];
                let last_upgrade_menu_log_key = "";
                window.arras_message_packet_log = chat_packet_log_entries;
                window.arras_upgrade_menu_log = upgrade_menu_log_entries;

                function copy_packet_bytes(packet) {
                    return Array.from(packet || [], value => value & 255);
                }

                function bytes_to_hex(bytes) {
                    return bytes.map(value => value.toString(16).padStart(2, "0")).join(" ");
                }

                function decode_arras_string_payload(packet, offset = 1) {
                    if (!packet || packet.length <= offset) return "";
                    let length_marker = packet[offset];
                    let start = offset + 1;
                    let length = packet.length - start;
                    if (length_marker === 254 && packet.length >= offset + 3) {
                        start = offset + 3;
                        length = packet[offset + 1] + packet[offset + 2] * 256;
                    } else if (length_marker >= 192) {
                        length = length_marker - 192;
                    }
                    return chat_packet_log_decoder.decode(packet.slice(start, Math.min(packet.length, start + length)));
                }

                function decode_outgoing_message_packet(packet) {
                    if (!packet || packet[0] !== 77 || packet.length < 2) return "";
                    return decode_arras_string_payload(packet, 1);
                }

                function decode_incoming_text_packet(packet) {
                    let raw_text = chat_packet_log_decoder.decode(packet);
                    let has_string_marker = (packet[1] >= 192 && packet[1] < 224) || packet[1] === 254;
                    let text = has_string_marker ? decode_arras_string_payload(packet, 1) : raw_text.slice(1);
                    return {
                        raw_text,
                        text
                    };
                }

                function decode_incoming_message_packet(packet) {
                    let decoded_packet = null;
                    let offsets = [];
                    try {
                        [decoded_packet, offsets] = decode_packet(packet, "M");
                    } catch (error) {}
                    let text_start = offsets[3] ?? 5;
                    let text_end = packet.length;
                    while (text_end > text_start && packet[text_end - 1] < 32) text_end--;
                    return {
                        raw_text: chat_packet_log_decoder.decode(packet),
                        text: chat_packet_log_decoder.decode(packet.slice(text_start, text_end)),
                        sender_id: decoded_packet?.[1] ?? null,
                        flags: decoded_packet?.[2] ?? null,
                        text_start,
                        trailing_bytes: copy_packet_bytes(packet.slice(text_end))
                    };
                }

                function is_probable_incoming_text_packet(packet) {
                    if (!packet || packet.length < 2) return false;
                    if ((packet[1] >= 192 && packet[1] < 224) || packet[1] === 254) {
                        return decode_arras_string_payload(packet, 1).length > 0;
                    }
                    let printable = 0;
                    for (let index = 1; index < packet.length; index++) {
                        let byte = packet[index];
                        if (byte === 9 || byte === 10 || byte === 13 || (byte >= 32 && byte <= 126)) printable++;
                    }
                    return printable >= 3 && printable / Math.max(packet.length - 1, 1) >= 0.8;
                }

                function format_packet_log_time(entry) {
                    try {
                        return new Date(entry.time_ms || entry.time).toLocaleTimeString([], {
                            hour: "2-digit",
                            minute: "2-digit",
                            second: "2-digit"
                        });
                    } catch (error) {
                        return "";
                    }
                }

                function render_message_packet_log() {
                    let output = document.querySelector('[data-control-value="chat-packet-log"]');
                    let status = document.querySelector('[data-control-value="chat-log-status"]');
                    if (status) status.textContent = `${chat_packet_log_entries.length} captured`;
                    if (!output) return;
                    output.textContent = "";
                    if (!chat_packet_log_entries.length) {
                        let empty = document.createElement("div");
                        empty.className = "arras-output-line";
                        let text = document.createElement("span");
                        text.className = "arras-output-line-text";
                        text.textContent = "No message packets captured yet.";
                        empty.appendChild(text);
                        output.appendChild(empty);
                        return;
                    }
                    for (let entry of chat_packet_log_entries.slice(-50).reverse()) {
                        let item = document.createElement("div");
                        item.className = "arras-packet-entry";
                        let head = document.createElement("div");
                        head.className = "arras-packet-entry-head";
                        let direction = document.createElement("span");
                        direction.className = `arras-packet-direction ${entry.direction}`;
                        direction.textContent = `${entry.direction.toUpperCase()} ${entry.header || "?"}/${entry.header_code ?? "?"}`;
                        let time = document.createElement("span");
                        time.className = "arras-packet-time";
                        time.textContent = format_packet_log_time(entry);
                        head.append(direction, time);
                        let text = document.createElement("div");
                        text.className = "arras-packet-text";
                        text.textContent = entry.text || entry.raw_text || "(empty)";
                        let hex = document.createElement("div");
                        hex.className = "arras-packet-hex";
                        let meta = entry.sender_id !== null ? ` · sender ${entry.sender_id}` : "";
                        if (entry.flags !== null) meta += ` · flags ${entry.flags}`;
                        hex.textContent = `${entry.length} bytes · ${entry.source || "unknown"}${meta} · ${entry.hex}`;
                        item.append(head, text, hex);
                        output.appendChild(item);
                    }
                }

                function record_message_packet_log(entry) {
                    let bytes = copy_packet_bytes(entry.packet);
                    let header_code = bytes[0] ?? null;
                    let hex = bytes_to_hex(bytes);
                    let now = Date.now();
                    let last = chat_packet_log_entries[chat_packet_log_entries.length - 1];
                    if (last && last.direction === entry.direction && last.hex === hex && now - last.time_ms < 150) {
                        return last;
                    }
                    let normalized = {
                        time: new Date(now).toISOString(),
                        time_ms: now,
                        direction: entry.direction,
                        source: entry.source || "",
                        header: entry.header || (header_code === null ? "" : String.fromCharCode(header_code)),
                        header_code,
                        text: entry.text || "",
                        raw_text: entry.raw_text || "",
                        length: bytes.length,
                        address: entry.address ?? null,
                        sender_id: entry.sender_id ?? null,
                        flags: entry.flags ?? null,
                        text_start: entry.text_start ?? null,
                        trailing_bytes: entry.trailing_bytes || [],
                        bytes,
                        hex
                    };
                    chat_packet_log_entries.push(normalized);
                    if (chat_packet_log_entries.length > CHAT_PACKET_LOG_LIMIT) {
                        chat_packet_log_entries.splice(0, chat_packet_log_entries.length - CHAT_PACKET_LOG_LIMIT);
                    }
                    window.arras_message_packet_log = chat_packet_log_entries;
                    window.last_arras_message_packet = normalized;
                    render_message_packet_log();
                    return normalized;
                }

                window.clear_arras_message_packet_log = function() {
                    chat_packet_log_entries.length = 0;
                    window.arras_message_packet_log = chat_packet_log_entries;
                    window.last_arras_message_packet = null;
                    render_message_packet_log();
                };

                function get_current_tank_snapshot() {
                    let player = window.update_data?.player || {};
                    let mockup_id = player.mockup_id ?? null;
                    let mockup = mockup_id === null ? null : window.mockup_data?.mockups?.[mockup_id] || null;
                    return {
                        id: mockup_id,
                        name: mockup?.name || "",
                        shape: mockup?.shape ?? null,
                        color: mockup?.color ?? player.color ?? null
                    };
                }

                function get_mockup_export_snapshot() {
                    let mockups = window.mockup_data?.mockups || {};
                    let entries = Object.entries(mockups)
                        .map(([id, mockup]) => ({
                            id: Number(id),
                            name: mockup?.name || "",
                            shape: mockup?.shape ?? null,
                            color: mockup?.color ?? null,
                            real_id: mockup?.real_id ?? null,
                            guns: mockup?.guns || [],
                            turrets: mockup?.turrets || []
                        }))
                        .sort((a, b) => a.id - b.id);
                    return {
                        time: new Date().toISOString(),
                        count: entries.length,
                        mockups: entries
                    };
                }

                function get_upgrade_menu_snapshot() {
                    let upgrades = Array.from(window.update_data?.player?.upgrades || []);
                    let current_tank = get_current_tank_snapshot();
                    return {
                        time: new Date().toISOString(),
                        time_ms: Date.now(),
                        current_tank,
                        slots: upgrades.map((token, slot) => ({
                            slot,
                            token,
                            send_packet: [85, slot]
                        }))
                    };
                }

                function render_upgrade_menu_log() {
                    let output = document.querySelector('[data-control-value="upgrade-log-output"]');
                    let status = document.querySelector('[data-control-value="upgrade-log-status"]');
                    let mockup_status = document.querySelector('[data-control-value="mockup-export-status"]');
                    let current = get_upgrade_menu_snapshot();
                    let mockup_count = Object.keys(window.mockup_data?.mockups || {}).length;
                    if (status) {
                        status.textContent = `${upgrade_menu_log_entries.length} captured · ${current.slots.length} visible`;
                    }
                    if (mockup_status) {
                        let tank_name = current.current_tank.name || (current.current_tank.id === null ? "unknown" : `#${current.current_tank.id}`);
                        mockup_status.textContent = `${mockup_count} mockups · current ${tank_name}`;
                    }
                    if (!output) return;
                    output.textContent = "";
                    let latest = upgrade_menu_log_entries[upgrade_menu_log_entries.length - 1] || current;
                    if (!latest.slots.length) {
                        let empty = document.createElement("div");
                        empty.className = "arras-output-line";
                        let text = document.createElement("span");
                        text.className = "arras-output-line-text";
                        text.textContent = "No visible upgrade menu captured yet.";
                        empty.appendChild(text);
                        output.appendChild(empty);
                        return;
                    }
                    for (let slot of latest.slots) {
                        let line = document.createElement("div");
                        line.className = "arras-output-line";
                        let text = document.createElement("span");
                        text.className = "arras-output-line-text";
                        text.textContent = `slot ${slot.slot} · token ${slot.token} · send [${slot.send_packet.join(", ")}]`;
                        let button = document.createElement("button");
                        button.type = "button";
                        button.className = "arras-copy-button";
                        button.dataset.controlAction = "upgrade-send-slot";
                        button.dataset.upgradeSlot = String(slot.slot);
                        button.textContent = `U${slot.slot}`;
                        line.append(text, button);
                        output.appendChild(line);
                    }
                }

                function record_upgrade_menu_snapshot() {
                    let snapshot = get_upgrade_menu_snapshot();
                    let key = `${snapshot.current_tank.id}|${snapshot.slots.map(slot => slot.token).join(",")}`;
                    if (!snapshot.slots.length || key === last_upgrade_menu_log_key) {
                        render_upgrade_menu_log();
                        return snapshot;
                    }
                    last_upgrade_menu_log_key = key;
                    upgrade_menu_log_entries.push(snapshot);
                    if (upgrade_menu_log_entries.length > UPGRADE_MENU_LOG_LIMIT) {
                        upgrade_menu_log_entries.splice(0, upgrade_menu_log_entries.length - UPGRADE_MENU_LOG_LIMIT);
                    }
                    window.arras_upgrade_menu_log = upgrade_menu_log_entries;
                    window.last_arras_upgrade_menu = snapshot;
                    render_upgrade_menu_log();
                    return snapshot;
                }

                window.get_arras_upgrade_menu_snapshot = get_upgrade_menu_snapshot;
                window.get_arras_mockup_export = get_mockup_export_snapshot;
                window.clear_arras_upgrade_menu_log = function() {
                    upgrade_menu_log_entries.length = 0;
                    last_upgrade_menu_log_key = "";
                    window.arras_upgrade_menu_log = upgrade_menu_log_entries;
                    window.last_arras_upgrade_menu = null;
                    render_upgrade_menu_log();
                };

                function send_control_packet(payload) {
                    let body = control_packet_encoder.encode(JSON.stringify(payload));
                    let packet = new Uint8Array(body.length + 1);
                    packet[0] = 10;
                    packet.set(body, 1);
                    if (middle_ws.readyState === WebSocket.OPEN) {
                        middle_ws.send(packet.buffer);
                    } else {
                        pending_control_packets.push(packet.buffer);
                    }
                }

                function request_control_status() {
                    send_control_packet({ type: "requestStatus" });
                }

                function get_current_server_code() {
                    return location.hash.length > 1 ? location.hash.substring(1) : "";
                }

                function register_current_server_with_relay() {
                    if (middle_ws.readyState !== WebSocket.OPEN || location.hash.length <= 1) return;
                    let u8_text = control_packet_encoder.encode(location.hash.substring(1));
                    let packet = new Uint8Array(u8_text.length + 1);
                    packet[0] = 2;
                    packet.set(u8_text, 1);

                    function get_overlay_current_fov() {
                        if (modified_cam.use_camera) return modified_cam.fov;
                        let base_fov = modified_cam.base_fov || modified_cam.fov;
                        return base_fov ? base_fov * modified_cam.zoom_multiplier : modified_cam.fov;
                    }

                    function get_overlay_world_height(fov, width, height) {
                        return width > 0 ? fov * height / width : fov * 0.5;
                    }

                    function get_overlay_scale(fov, width) {
                        return width > 0 ? width / fov : 0;
                    }

                    function resolve_overlay_color(color) {
                        if (TEAM_COLORS[color]) return TEAM_COLORS[color];
                        switch (color) {
                            case 20:
                                return 150 > Date.now() % 300 ? TEAM_COLORS[10] : TEAM_COLORS[12];
                            case 21:
                                return 150 > Date.now() % 300 ? TEAM_COLORS[10] : TEAM_COLORS[16];
                            case 22:
                                return 150 > Date.now() % 300 ? TEAM_COLORS[16] : TEAM_COLORS[10];
                            case 23:
                                return 150 > Date.now() % 300 ? TEAM_COLORS[12] : TEAM_COLORS[16];
                            case 24:
                                return 150 > Date.now() % 300 ? TEAM_COLORS[16] : TEAM_COLORS[12];
                            case 30:
                                return "#a913cf";
                            case 31:
                                return "#226ef6";
                            case 32:
                                return "#ff1000";
                            case 33:
                                return "#ff9000";
                            case 34:
                                return "#00e00b";
                            case 35:
                                return "#ffd300";
                            case 36:
                                return qb("#ff1000 #ff9000 #ffd300 #00e00b #226ef6 #a913cf".split(" ")[Math.floor(Date.now() / 200 % 6)], "#ff9000 #ffd300 #00e00b #226ef6 #a913cf #ff1000".split(" ")[Math.floor(Date.now() / 200 % 6)], Date.now() / 200 % 1);
                            case 37:
                                return qb("#ffffff", 2E3 > Date.now() % 4E3 ? "#55cdfc" : "#f7a8b8", 5 * Math.sin(Date.now() % 2E3 / 2E3 * Math.PI) - 2);
                            case 39:
                                return "#654321";
                            case 40:
                                return "#e58100";
                            case 41:
                                return "#267524";
                            default:
                                return TEAM_COLORS[255];
                        }
                    }

                    function create_overlay_canvas() {
                        if (overlay_canvas) return;
                        overlay_canvas = document.createElement("canvas");
                        Object.assign(overlay_canvas.style, {
                            position: "fixed",
                            left: "0",
                            top: "0",
                            width: "0",
                            height: "0",
                            pointerEvents: "none",
                            zIndex: 9999,
                            background: "transparent"
                        });
                        document.body.appendChild(overlay_canvas);
                        overlay_ctx = overlay_canvas.getContext("2d", {
                            alpha: true
                        });
                        overlay_resize_handler = () => {
                            if (!overlay_canvas || !overlay_ctx) return;
                            let rect = get_current_game_canvas_rect();
                            let dpr = window.devicePixelRatio || 1;
                            overlay_canvas.style.left = `${rect.left}px`;
                            overlay_canvas.style.top = `${rect.top}px`;
                            overlay_canvas.style.width = `${rect.width}px`;
                            overlay_canvas.style.height = `${rect.height}px`;
                            overlay_canvas.width = Math.max(Math.round(rect.width * dpr), 1);
                            overlay_canvas.height = Math.max(Math.round(rect.height * dpr), 1);
                            overlay_ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                        };
                        window.addEventListener("resize", overlay_resize_handler);
                        document.addEventListener("fullscreenchange", overlay_resize_handler);
                        overlay_resize_handler();
                    }

                    function destroy_overlay_canvas() {
                        if (overlay_render_loop) {
                            cancelAnimationFrame(overlay_render_loop);
                            overlay_render_loop = null;
                        }
                        if (overlay_resize_handler) {
                            window.removeEventListener("resize", overlay_resize_handler);
                            document.removeEventListener("fullscreenchange", overlay_resize_handler);
                            overlay_resize_handler = null;
                        }
                        if (overlay_canvas) {
                            overlay_canvas.remove();
                            overlay_canvas = null;
                        }
                        overlay_ctx = null;
