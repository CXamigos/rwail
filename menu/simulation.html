                    function project_world_to_screen(x, y, width, height, cam_x, cam_y, scale) {
                        return {
                            x: width * 0.5 + (x - cam_x) * scale,
                            y: height * 0.5 + (y - cam_y) * scale
                        };
                    }

                    function minimap_to_world_x(x) {
                        return x / 255 * (room_data.room_dimensions[2] - room_data.room_dimensions[0]) + room_data.room_dimensions[0];
                    }

                    function minimap_to_world_y(y) {
                        return y / 255 * (room_data.room_dimensions[3] - room_data.room_dimensions[1]) + room_data.room_dimensions[1];
                    }

                    function get_overlay_camera_state() {
                        let current_fov = get_overlay_current_fov();
                        return {
                            x: modified_cam.x,
                            y: modified_cam.y,
                            fov: current_fov,
                            base_fov: modified_cam.base_fov || current_fov
                        };
                    }

                    function get_overlay_wall_metrics() {
                        if (!broadcast_data || !room_data.room_dimensions.length) return null;
                        let base_half_size = Infinity;
                        for (let id in broadcast_data.global_minimap) {
                            let entry = broadcast_data.global_minimap[id];
                            if (entry.type == 2 && entry.size > 0 && entry.size < base_half_size) base_half_size = entry.size;
                        }
                        if (!Number.isFinite(base_half_size)) return null;
                        let left = room_data.room_dimensions[0];
                        let top = room_data.room_dimensions[1];
                        let room_width = room_data.room_dimensions[2] - left;
                        let room_height = room_data.room_dimensions[3] - top;
                        let grid_width = Math.max(Math.trunc(room_width / base_half_size * 0.5), 1);
                        let grid_height = Math.max(Math.trunc(room_height / base_half_size * 0.5), 1);
                        return {
                            left,
                            top,
                            base_half_size,
                            grid_width,
                            grid_height,
                            minimap_step_x: 255 / grid_width,
                            minimap_step_y: 255 / grid_height,
                            cell_width: room_width / grid_width,
                            cell_height: room_height / grid_height
                        };
                    }

                    function get_exact_overlay_wall(id, fallback_color) {
                        if (!update_data || !mockup_data) return null;
                        let entity = update_data.entities[id];
                        if (!entity) return null;
                        let mockup = mockup_data.mockups[entity.mockup_id];
                        if (!mockup || (mockup.name !== "Wall" && mockup.name !== "Rock")) return null;
                        let size = Math.max(entity.size || 0, 1);
                        return {
                            x: entity.x,
                            y: entity.y,
                            half_w: size,
                            half_h: size,
                            color: resolve_overlay_color(entity.color ?? fallback_color)
                        };
                    }

                    function create_overlay_wall(id, entry, metrics) {
                        let exact_wall = get_exact_overlay_wall(id, entry.color);
                        if (exact_wall) return exact_wall;
                        if (!metrics) {
                            let size = Math.max(entry.size || 0, 1);
                            return {
                                x: minimap_to_world_x(entry.x),
                                y: minimap_to_world_y(entry.y),
                                half_w: size,
                                half_h: size,
                                color: resolve_overlay_color(entry.color)
                            };
                        }
                        let cells_x = Math.max(1, Math.round(entry.size / metrics.base_half_size));
                        let cells_y = Math.max(1, Math.round(entry.size / metrics.base_half_size));
                        let cell_x = Math.round((entry.x - metrics.minimap_step_x * (cells_x * 0.5)) / metrics.minimap_step_x);
                        let cell_y = Math.round((entry.y - metrics.minimap_step_y * (cells_y * 0.5)) / metrics.minimap_step_y);
                        return {
                            x: metrics.left + (cell_x + cells_x * 0.5) * metrics.cell_width,
                            y: metrics.top + (cell_y + cells_y * 0.5) * metrics.cell_height,
                            half_w: Math.max(metrics.cell_width * cells_x * 0.5, 1),
                            half_h: Math.max(metrics.cell_height * cells_y * 0.5, 1),
                            color: resolve_overlay_color(entry.color)
                        };
                    }

                    function format_overlay_score(score) {
                        score = Number(score);
                        if (!Number.isFinite(score)) return "";
                        let abs_score = Math.abs(score);
                        if (abs_score >= 1e9) return `${(score / 1e9).toFixed(abs_score >= 1e10 ? 0 : 1).replace(/\.0$/, "")}b`;
                        if (abs_score >= 1e6) return `${(score / 1e6).toFixed(abs_score >= 1e7 ? 0 : 1).replace(/\.0$/, "")}m`;
                        if (abs_score >= 1e3) return `${(score / 1e3).toFixed(abs_score >= 1e4 ? 0 : 1).replace(/\.0$/, "")}k`;
                        return Math.round(score).toLocaleString("en-US");
                    }

                    function pick_overlay_text(...values) {
                        for (let value of values) {
                            if (typeof value === "string" && value.length) return value;
                        }
                        return "";
                    }

                    function is_overlay_mockup_char(value) {
                        return Number.isInteger(value) && value >= 32 && value <= 126;
                    }

                    function remember_overlay_mockup_name(mockup_id, raw_name) {
                        if (!Number.isInteger(mockup_id)) return;
                        let cleaned_name = String(raw_name || "").split("/")[0].trim();
                        if (cleaned_name.length < 2) return;
                        overlay_mockup_names[mockup_id] = cleaned_name;
                    }

                    function remember_overlay_mockup_packet(packet) {
                        let values = Array.from(packet || []);
                        if (!values.length) return;
                        let current = "";
                        let flush = end_index => {
                            if (current.length > 2) {
                                let mockup_id = values[end_index - current.length - 2];
                                remember_overlay_mockup_name(mockup_id, current);
                            }
                            current = "";
                        };
                        for (let index = 0; index < values.length; index++) {
                            let value = values[index];
                            if (is_overlay_mockup_char(value) && value !== 0) {
                                current += String.fromCharCode(value);
                            } else {
                                flush(index);
                            }
                        }
                        flush(values.length);
                    }

                    function resolve_overlay_tank_name(mockup_id) {
                        if (mockup_id === undefined || mockup_id === null) return "";
                        return mockup_data?.mockups?.[mockup_id]?.name || overlay_mockup_names[mockup_id] || "";
                    }

                    function make_remote_overlay_player_key(observer_id, player_id) {
                        return `observer:${observer_id}:player:${player_id}`;
                    }

                    function get_overlay_player_lookup_key(id) {
                        if (id === undefined || id === null) return null;
                        let key = String(id);
                        let remote_player_marker = ":player:";
                        if (key.startsWith("observer:") && key.includes(remote_player_marker)) {
                            let lookup_key = key.slice(key.lastIndexOf(remote_player_marker) + remote_player_marker.length);
                            if (lookup_key.length) return lookup_key;
                        }
                        return key;
                    }

                    function cleanup_remote_overlay_observers() {
                        let now = Date.now();
                        for (let observer_id in remote_overlay_observers) {
                            if (now - (remote_overlay_observers[observer_id].last_seen_at || 0) > OVERLAY_REMOTE_OBSERVER_STALE_MS) {
                                delete remote_overlay_observers[observer_id];
                            }
                        }
                    }

                    function get_overlay_player_storage_keys(id) {
                        if (id === undefined || id === null) return [];
                        let key = String(id);
                        if (!key.length) return [];
                        let lookup_key = get_overlay_player_lookup_key(key);
                        return lookup_key && lookup_key !== key ? [key, lookup_key] : [key];
                    }

                    function merge_overlay_player_record(existing, key, snapshot) {
                        existing = existing || {
                            id: key
                        };
                        let mockup_id = snapshot.mockup_id ?? existing.mockup_id;
                        let tank_name = pick_overlay_text(snapshot.tank_name, resolve_overlay_tank_name(mockup_id), existing.tank_name);
                        let last_seen_at = snapshot.last_seen_at ?? Date.now();
                        if ((existing.last_seen_at || 0) > last_seen_at) last_seen_at = existing.last_seen_at;
                        return {
                            id: key,
                            name: pick_overlay_text(snapshot.name, existing.name),
                            score: snapshot.score ?? existing.score,
                            mockup_id: mockup_id,
                            tank_name: tank_name,
                            color: snapshot.color ?? existing.color,
                            last_seen_at: last_seen_at
                        };
                    }

                    function remember_overlay_player_snapshot(id, snapshot) {
                        if (id === undefined || id === null || !snapshot) return;
                        let keys = get_overlay_player_storage_keys(id);
                        if (!keys.length) return;
                        let seed_record = null;
                        for (let key of keys) {
                            if (!tracked_overlay_players[key]) continue;
                            seed_record = tracked_overlay_players[key];
                            break;
                        }
                        for (let key of keys) {
                            tracked_overlay_players[key] = merge_overlay_player_record(tracked_overlay_players[key] || seed_record, key, snapshot);
                            seed_record = tracked_overlay_players[key];
                        }
                    }

                    function touch_overlay_player_presence(id, last_seen_at = Date.now()) {
                        if (id === undefined || id === null) return;
                        for (let key of get_overlay_player_storage_keys(id)) {
                            let existing = tracked_overlay_players[key];
                            if (!existing) continue;
                            if ((existing.last_seen_at || 0) >= last_seen_at) continue;
                            existing.last_seen_at = last_seen_at;
                        }
                    }

                    function remember_overlay_leaderboard_state() {
                        let now = Date.now();
                        for (let id in broadcast_data?.leaderboard || {}) {
                            let entry = broadcast_data.leaderboard[id];
                            remember_overlay_player_snapshot(id, {
                                name: entry.name,
                                score: entry.score,
                                mockup_id: entry.mockup_index,
                                tank_name: resolve_overlay_tank_name(entry.mockup_index),
                                color: entry.color,
                                last_seen_at: now
                            });
                        }
                    }

                    function remember_overlay_player_tab_state() {
                        let now = Date.now();
                        for (let id in player_tab_data?.players || {}) {
                            let entry = player_tab_data.players[id];
                            remember_overlay_player_snapshot(id, {
                                name: entry.name,
                                mockup_id: entry.mockup_index,
                                tank_name: resolve_overlay_tank_name(entry.mockup_index),
                                last_seen_at: now
                            });
                        }
                    }

                    function cleanup_tracked_overlay_players() {
                        let now = Date.now();
                        let recent_alias_cutoff = now - OVERLAY_TRACKED_PLAYER_STALE_MS;
                        let recent_remote_alias_ids = new Set();
                        for (let id in tracked_overlay_players) {
                            if (!id.includes(":player:")) continue;
                            if ((tracked_overlay_players[id].last_seen_at || 0) < recent_alias_cutoff) continue;
                            let lookup_key = get_overlay_player_lookup_key(id);
                            if (lookup_key) recent_remote_alias_ids.add(lookup_key);
                        }
                        for (let id in tracked_overlay_players) {
                            if (id.includes(":")) {
                                if (now - (tracked_overlay_players[id].last_seen_at || 0) > OVERLAY_TRACKED_PLAYER_STALE_MS) {
                                    delete tracked_overlay_players[id];
                                }
                                continue;
                            }
                            let still_visible = !!broadcast_data?.global_minimap?.[id] || !!broadcast_data?.team_minimap?.[id];
                            let still_listed = !!broadcast_data?.leaderboard?.[id] || !!player_tab_data?.players?.[id];
                            let still_tracked_remotely = recent_remote_alias_ids.has(id);
                            if (!still_visible && !still_listed && !still_tracked_remotely && now - (tracked_overlay_players[id].last_seen_at || 0) > OVERLAY_TRACKED_PLAYER_STALE_MS) {
                                delete tracked_overlay_players[id];
                            }
                        }
                    }

                    function maybe_cleanup_overlay_tracking() {
                        let now = Date.now();
                        if (now - overlay_last_cleanup_at < OVERLAY_CLEANUP_INTERVAL_MS) return;
                        overlay_last_cleanup_at = now;
                        cleanup_remote_overlay_observers();
                        cleanup_tracked_overlay_players();
                        cleanup_overlay_blip_motion_states();
                    }

                    function cleanup_overlay_blip_motion_states() {
                        let now = performance.now();
                        for (let id in overlay_blip_motion_states) {
                            if (now - (overlay_blip_motion_states[id].last_seen_at || 0) > 5000) {
                                delete overlay_blip_motion_states[id];
                            }
                        }
                    }

                    function get_overlay_blip_tween_position(state, now) {
                        if (!overlay_settings.smooth_player_dots || !state || state.duration <= 0) {
                            return {
                                x: state.target_x,
                                y: state.target_y
                            };
                        }
                        let progress = Math.max(0, Math.min((now - state.started_at) / state.duration, 1));
                        let eased = progress * progress * (3 - 2 * progress);
                        return {
                            x: state.from_x + (state.target_x - state.from_x) * eased,
                            y: state.from_y + (state.target_y - state.from_y) * eased
                        };
                    }

                    function smooth_overlay_blip_position(blip) {
                        if (!blip?.id) return blip;
                        let now = performance.now();
                        let state = overlay_blip_motion_states[blip.id];
                        if (!state) {
                            state = overlay_blip_motion_states[blip.id] = {
                                from_x: blip.x,
                                from_y: blip.y,
                                target_x: blip.x,
                                target_y: blip.y,
                                started_at: now,
                                duration: 0,
                                last_packet_at: now,
                                last_seen_at: now
                            };
                        }
                        if (state.target_x !== blip.x || state.target_y !== blip.y) {
                            let tween_from = get_overlay_blip_tween_position(state, now);
                            let interval = Math.max(Math.min(now - state.last_packet_at, 250), 16);
                            state.from_x = tween_from.x;
                            state.from_y = tween_from.y;
                            state.target_x = blip.x;
                            state.target_y = blip.y;
                            state.started_at = now;
                            state.duration = interval;
                            state.last_packet_at = now;
                        }
                        state.last_seen_at = now;
                        let smoothed_position = get_overlay_blip_tween_position(state, now);
                        if (overlay_settings.smooth_player_dots) {
                            blip.x = smoothed_position.x;
                            blip.y = smoothed_position.y;
                        }
                        return blip;
                    }

                    function get_overlay_wall_hud_regions(width, height) {
                        if (!overlay_settings.draw_walls_behind_hud) return [];
                        let margin = 16;
                        let leaderboard_width = Math.min(Math.max(width * 0.18, 165), 280);
                        let leaderboard_height = Math.min(Math.max(height * 0.2, 120), 250);
                        let minimap_size = Math.min(Math.max(Math.min(width, height) * 0.18, 125), 220);
                        return [{
                            x: width - leaderboard_width - margin,
                            y: margin,
                            width: leaderboard_width,
                            height: leaderboard_height,
                            min_alpha: 0.22
                        }, {
                            x: width - minimap_size - margin,
                            y: height - minimap_size - margin,
                            width: minimap_size,
                            height: minimap_size,
                            min_alpha: 0.16
                        }];
                    }

                    function get_overlay_rect_overlap_ratio(ax1, ay1, ax2, ay2, bx1, by1, bx2, by2) {
                        let overlap_w = Math.max(0, Math.min(ax2, bx2) - Math.max(ax1, bx1));
                        let overlap_h = Math.max(0, Math.min(ay2, by2) - Math.max(ay1, by1));
                        if (overlap_w <= 0 || overlap_h <= 0) return 0;
                        let area = Math.max((ax2 - ax1) * (ay2 - ay1), 1);
                        return overlap_w * overlap_h / area;
                    }

                    function get_overlay_wall_hud_alpha_multiplier(projected_x, projected_y, half_w, half_h, width, height) {
                        let regions = get_overlay_wall_hud_regions(width, height);
                        if (!regions.length) return 1;
                        let left = projected_x - half_w;
                        let right = projected_x + half_w;
                        let top = projected_y - half_h;
                        let bottom = projected_y + half_h;
                        let multiplier = 1;
                        for (let region of regions) {
                            let overlap_ratio = get_overlay_rect_overlap_ratio(left, top, right, bottom, region.x, region.y, region.x + region.width, region.y + region.height);
                            if (!overlap_ratio) continue;
                            let region_multiplier = Math.max(region.min_alpha, 1 - overlap_ratio * 0.92);
                            multiplier = Math.min(multiplier, region_multiplier);
                        }
                        return multiplier;
                    }

                    function remember_overlay_entity(id, entity) {
                        if (id === undefined || id === null || !entity) return;
                        let key = String(id);
                        if (String(update_data?.player?.id ?? "") === key) return;
                        let mockup_name = resolve_overlay_tank_name(entity.mockup_id);
                        if (mockup_name === "Wall" || mockup_name === "Rock") return;
                        remember_overlay_player_snapshot(key, {
                            name: entity.name,
                            score: entity.score,
                            mockup_id: entity.mockup_id,
                            tank_name: mockup_name,
                            color: entity.color,
                            last_seen_at: Date.now()
                        });
                    }

                    function get_overlay_tracked_player_info(id) {
                        if (!overlay_settings.track_player_dots) return null;
                        let key = String(id);
                        let lookup_key = get_overlay_player_lookup_key(key);
                        let remembered = tracked_overlay_players[key];
                        let canonical_remembered = lookup_key ? tracked_overlay_players[lookup_key] : undefined;
                        let leaderboard_entry = lookup_key ? broadcast_data?.leaderboard?.[lookup_key] : null;
                        let player_tab_entry = lookup_key ? player_tab_data?.players?.[lookup_key] : null;
                        let mockup_id = remembered?.mockup_id ?? canonical_remembered?.mockup_id;
                        if (mockup_id === undefined || mockup_id === null) mockup_id = player_tab_entry?.mockup_index;
                        if (mockup_id === undefined || mockup_id === null) mockup_id = leaderboard_entry?.mockup_index;
                        let info = {
                            name: pick_overlay_text(remembered?.name, canonical_remembered?.name, player_tab_entry?.name, leaderboard_entry?.name),
                            tank_name: pick_overlay_text(remembered?.tank_name, canonical_remembered?.tank_name, resolve_overlay_tank_name(mockup_id)),
                            score: remembered?.score ?? canonical_remembered?.score ?? leaderboard_entry?.score ?? null
                        };
                        if (!info.name && !info.tank_name && info.score === null) return null;
                        return info;
                    }

                    function build_overlay_blip_labels(id) {
                        if (!overlay_settings.show_tracked_name && !overlay_settings.show_tracked_score && !overlay_settings.show_tracked_tank_name) {
                            return null;
                        }
                        let info = get_overlay_tracked_player_info(id);
                        if (!info) return null;
                        let above_lines = [];
                        let below_lines = [];
                        if (overlay_settings.show_tracked_name && info.name) above_lines.push(info.name);
                        if (overlay_settings.show_tracked_score && info.score !== null) above_lines.push(format_overlay_score(info.score));
                        if (overlay_settings.show_tracked_tank_name && info.tank_name) below_lines.push(info.tank_name);
                        if (!above_lines.length && !below_lines.length) return null;
                        return {
                            above_lines,
                            below_lines
                        };
                    }

                    function merge_remote_overlay_observer_blips(blips) {
                        for (let observer_id in remote_overlay_observers) {
                            let observer = remote_overlay_observers[observer_id];
                            let visible_player_map = new Map();
                            for (let player of observer.known_players || []) {
                                if (player?.id === undefined || player?.id === null) continue;
                                remember_overlay_player_snapshot(make_remote_overlay_player_key(observer_id, player.id), {
                                    name: player.name,
                                    score: player.score,
                                    mockup_id: player.mockup_id,
                                    tank_name: resolve_overlay_tank_name(player.mockup_id),
                                    color: player.color,
                                    last_seen_at: observer.last_seen_at
                                });
                            }
                            for (let entry of observer.player_tab) {
                                if (entry?.id === undefined || entry?.id === null) continue;
                                remember_overlay_player_snapshot(make_remote_overlay_player_key(observer_id, entry.id), {
                                    name: entry.name,
                                    mockup_id: entry.mockup_index,
                                    tank_name: resolve_overlay_tank_name(entry.mockup_index),
                                    last_seen_at: observer.last_seen_at
                                });
                            }
                            for (let entity of observer.visible_team_players) {
                                if (entity?.id === undefined || entity?.id === null) continue;
                                let visible_id = String(entity.id);
                                visible_player_map.set(visible_id, entity);
                                remember_overlay_player_snapshot(make_remote_overlay_player_key(observer_id, visible_id), {
                                    name: entity.name,
                                    score: entity.score,
                                    mockup_id: entity.mockup_id,
                                    tank_name: resolve_overlay_tank_name(entity.mockup_id),
                                    color: entity.color,
                                    last_seen_at: observer.last_seen_at
                                });
                            }
                            for (let entry of observer.team_minimap) {
                                if (entry?.id === undefined || entry?.id === null) continue;
                                let remote_id = String(entry.id);
                                let key = make_remote_overlay_player_key(observer_id, remote_id);
                                touch_overlay_player_presence(key, observer.last_seen_at);
                                let leaderboard_entry = broadcast_data?.leaderboard?.[get_overlay_player_lookup_key(key)];
                                if (leaderboard_entry) {
                                    remember_overlay_player_snapshot(key, {
                                        name: leaderboard_entry.name,
                                        score: leaderboard_entry.score,
                                        mockup_id: leaderboard_entry.mockup_index,
                                        tank_name: resolve_overlay_tank_name(leaderboard_entry.mockup_index),
                                        last_seen_at: observer.last_seen_at
                                    });
                                }
                                let visible_player = visible_player_map.get(remote_id);
                                let existing = blips.get(key) || {};
                                blips.set(key, {
                                    id: key,
                                    x: visible_player?.x ?? minimap_to_world_x(entry.x),
                                    y: visible_player?.y ?? minimap_to_world_y(entry.y),
                                    size: Math.max(existing.size || 0, visible_player?.size || 18),
                                    color: resolve_overlay_color(visible_player?.color ?? entry.color),
                                    observer_team: true
                                });
                            }
                        }
                    }

                    function get_overlay_entities() {
                        let walls = [];
                        let blips = new Map();
                        if (!broadcast_data || !room_data.room_dimensions.length) {
                            return {
                                walls,
                                blips: []
                            };
                        }
                        maybe_cleanup_overlay_tracking();
                        let wall_metrics = get_overlay_wall_metrics();
                        for (let id in broadcast_data.global_minimap) {
                            let entry = broadcast_data.global_minimap[id];
                            if (entry.type == 2) {
                                walls.push(create_overlay_wall(id, entry, wall_metrics));
                            } else if (!broadcast_data.team_minimap[id]) {
                                touch_overlay_player_presence(id);
                                blips.set(id, {
                                    id: id,
                                    x: minimap_to_world_x(entry.x),
                                    y: minimap_to_world_y(entry.y),
                                    size: Math.max(entry.size || 0, 14),
                                    color: resolve_overlay_color(entry.color)
                                });
                            }
                        }
                        for (let id in broadcast_data.team_minimap) {
                            let entry = broadcast_data.team_minimap[id];
                            touch_overlay_player_presence(id);
                            let existing = blips.get(id) || {};
                            blips.set(id, {
                                id: id,
                                x: minimap_to_world_x(entry.x),
                                y: minimap_to_world_y(entry.y),
                                size: Math.max(existing.size || 0, 18),
                                color: resolve_overlay_color(entry.color),
                                teammate: true
                            });
                        }
                        merge_remote_overlay_observer_blips(blips);
                        return {
                            walls,
                            blips: Array.from(blips.values(), blip => smooth_overlay_blip_position(blip))
                        };
                    }

                    function draw_overlay_room_bounds(ctx, width, height, camera, scale) {
                        if (!room_data.room_dimensions.length) return;
                        let left = room_data.room_dimensions[0];
                        let top = room_data.room_dimensions[1];
                        let right = room_data.room_dimensions[2];
                        let bottom = room_data.room_dimensions[3];
                        let start = project_world_to_screen(left, top, width, height, camera.x, camera.y, scale);
                        let end = project_world_to_screen(right, bottom, width, height, camera.x, camera.y, scale);
                        ctx.save();
                        ctx.strokeStyle = "rgba(255,255,255,0.18)";
                        ctx.lineWidth = 2;
                        ctx.strokeRect(start.x, start.y, end.x - start.x, end.y - start.y);
                        ctx.restore();
                    }

                    function draw_overlay_native_fov_box(ctx, width, height, camera, scale, native_half_width, native_half_height) {
                        if (!overlay_settings.show_native_fov_box) return;
                        let start = project_world_to_screen(camera.x - native_half_width, camera.y - native_half_height, width, height, camera.x, camera.y, scale);
                        let end = project_world_to_screen(camera.x + native_half_width, camera.y + native_half_height, width, height, camera.x, camera.y, scale);
                        ctx.save();
                        ctx.setLineDash([8, 6]);
                        ctx.strokeStyle = "rgba(122,219,186,0.86)";
                        ctx.lineWidth = 2;
                        ctx.shadowColor = "rgba(0,0,0,0.45)";
                        ctx.shadowBlur = 6;
                        ctx.strokeRect(start.x, start.y, end.x - start.x, end.y - start.y);
                        ctx.restore();
                    }

                    function draw_overlay_blip_labels(ctx, label_data, projected, radius_px) {
                        let above_lines = label_data?.above_lines || [];
                        let below_lines = label_data?.below_lines || [];
                        if ((!above_lines.length && !below_lines.length) || radius_px < 3.5) return;
                        ctx.save();
                        ctx.font = "bold 11px Ubuntu, sans-serif";
                        ctx.textAlign = "center";
                        ctx.lineWidth = 3;
                        ctx.strokeStyle = "rgba(0,0,0,0.75)";
                        ctx.fillStyle = "#ffffff";
                        let line_height = 13;

                        ctx.textBaseline = "bottom";
                        let above_start_y = projected.y - radius_px - 4 - line_height * (above_lines.length - 1);
                        for (let index = 0; index < above_lines.length; index++) {
                            let line = above_lines[index];
                            let y = above_start_y + index * line_height;
                            ctx.strokeText(line, projected.x, y);
                            ctx.fillText(line, projected.x, y);
                        }

                        ctx.textBaseline = "top";
                        let below_start_y = projected.y + radius_px + 4;
                        for (let index = 0; index < below_lines.length; index++) {
                            let line = below_lines[index];
                            let y = below_start_y + index * line_height;
                            ctx.strokeText(line, projected.x, y);
                            ctx.fillText(line, projected.x, y);
                        }
                        ctx.restore();
                    }

                    function get_overlay_relative_direction_from_screen_point(x, y, width, height) {
                        let dx = x - width * 0.5;
                        let dy = y - height * 0.5;
                        let deadzone_x = Math.max(width * 0.08, 26);
                        let deadzone_y = Math.max(height * 0.08, 22);
                        let horizontal = "";
                        let vertical = "";
                        if (Math.abs(dx) > deadzone_x) horizontal = dx > 0 ? "right" : "left";
                        if (Math.abs(dy) > deadzone_y) vertical = dy > 0 ? "bottom" : "top";
                        if (!horizontal && !vertical) return "center";
                        if (!horizontal) return vertical === "top" ? "above" : "below";
                        if (!vertical) return horizontal;
                        return `${vertical} ${horizontal}`;
                    }

                    function try_send_overlay_chat_tank_callout(text) {
                        if (typeof text !== "string" || !text.length) return false;
                        if (!window.packet_queue || !Array.isArray(window.packet_queue)) return false;
                        try {
                            let packet = packet_constructors.construct_message_packet(text);
                            window.packet_queue.push(packet);
                            return true;
                        } catch (error) {
                            return false;
                        }
                    }

                    function find_clicked_overlay_tank(click_x, click_y, width, height, camera, scale) {
                        let best = null;
                        let best_dist = Infinity;
                        let player_id = String(update_data?.player?.id ?? "");
                        let exact_candidates = new Map();
                        for (let id in update_data?.entities || {}) {
                            if (!Object.prototype.hasOwnProperty.call(update_data.entities, id)) continue;
                            if (player_id && String(id) === player_id) continue;
                            let entity = update_data.entities[id];
                            if (!entity) continue;
                            let has_identity = (typeof entity.name === "string" && entity.name.length > 0) || (Number(entity.score) > 0);
                            if (!has_identity) continue;
                            let tank_name = resolve_overlay_tank_name(entity.mockup_id);
                            if (tank_name === "Wall" || tank_name === "Rock") continue;
                            if (!Number.isFinite(entity.x) || !Number.isFinite(entity.y)) continue;
                            exact_candidates.set(String(id), {
                                id: String(id),
                                x: entity.x,
                                y: entity.y,
                                tank_name,
                                radius_world: Math.max(Number(entity.size) || 0, 8),
                                exact: true
                            });
                        }

                        let overlay_entities = get_overlay_entities();
                        for (let blip of overlay_entities.blips) {
                            if (!blip || blip.id === undefined || blip.id === null) continue;
                            let key = String(blip.id);
                            if (exact_candidates.has(key)) continue;
                            let info = get_overlay_tracked_player_info(key);
                            exact_candidates.set(key, {
                                id: key,
                                x: blip.x,
                                y: blip.y,
                                tank_name: info?.tank_name || "unknown",
                                radius_world: Math.max(Number(blip.size) || 0, 12),
                                exact: false,
                                teammate: !!blip.teammate || !!blip.observer_team
                            });
                        }

                        for (let candidate of exact_candidates.values()) {
                            let projected = project_world_to_screen(candidate.x, candidate.y, width, height, camera.x, camera.y, scale);
                            let px_radius = candidate.exact
                                ? Math.max(Math.min(candidate.radius_world * scale, 28), 7)
                                : Math.max(Math.min(candidate.radius_world * scale * overlay_settings.player_dot_scale, 22), candidate.teammate ? 5 : 4);
                            let dx = click_x - projected.x;
                            let dy = click_y - projected.y;
                            let dist = Math.hypot(dx, dy);
                            let threshold = Math.max(px_radius + 8, 12);
                            if (dist <= threshold && dist < best_dist) {
                                best_dist = dist;
                                best = candidate;
                            }
                        }
                        return best;
                    }

                    function handle_overlay_click_announce(event) {
                        if (!overlay_settings.click_announce_tank) return;
                        if (is_event_from_extended_view_overlay_menu(event)) return;
                        if (event.button !== 0) return;
                        if (!modified_cam.fov) return;
                        let now = Date.now();
                        if (now - overlay_last_click_announce_at < 180) return;
                        let rect = get_current_game_canvas_rect();
                        if (!rect.width || !rect.height) return;
                        let click_x = event.clientX - rect.left;
                        let click_y = event.clientY - rect.top;
                        if (click_x < 0 || click_x > rect.width || click_y < 0 || click_y > rect.height) return;
                        let camera = get_overlay_camera_state();
                        let scale = get_overlay_scale(camera.fov, rect.width);
                        if (!(scale > 0)) return;
                        let target = find_clicked_overlay_tank(click_x, click_y, rect.width, rect.height, camera, scale);
                        if (!target) return;
                        let direction = get_overlay_relative_direction_from_screen_point(click_x, click_y, rect.width, rect.height);
                        let tank_name = String(target.tank_name || "unknown").trim().toLowerCase();
                        if (!tank_name.length) tank_name = "unknown";
                        let message = `${tank_name} ${direction}`;
                        if (try_send_overlay_chat_tank_callout(message)) {
                            overlay_last_click_announce_at = now;
                        }
                    }

                    function draw_extended_view_overlay() {
                        if (!overlay_ctx || !overlay_canvas || !overlay_enabled || !modified_cam.fov) return;
                        if (overlay_resize_handler) overlay_resize_handler();
                        let width = overlay_canvas.clientWidth || window.innerWidth;
                        let height = overlay_canvas.clientHeight || window.innerHeight;
                        let camera = get_overlay_camera_state();
                        overlay_ctx.clearRect(0, 0, width, height);
                        let base_fov = camera.base_fov || camera.fov;
                        let zoomed_out = camera.fov > base_fov + 10;
                        let scale = get_overlay_scale(camera.fov, width);
                        if (!zoomed_out) return;
                        let native_half_width = base_fov * 0.5;
                        let native_half_height = get_overlay_world_height(base_fov, width, height) * 0.5;
                        let view_padding = 120;
                        let data = get_overlay_entities();
                        draw_overlay_room_bounds(overlay_ctx, width, height, camera, scale);
                        draw_overlay_native_fov_box(overlay_ctx, width, height, camera, scale, native_half_width, native_half_height);
                        for (let wall of data.walls) {
                            let dx = Math.abs(wall.x - camera.x);
                            let dy = Math.abs(wall.y - camera.y);
                            if (dx <= Math.max(native_half_width - wall.half_w, 0) && dy <= Math.max(native_half_height - wall.half_h, 0)) continue;
                            let projected = project_world_to_screen(wall.x, wall.y, width, height, camera.x, camera.y, scale);
                            let half_w = Math.max(wall.half_w * scale, 1.5);
                            let half_h = Math.max(wall.half_h * scale, 1.5);
                            if (projected.x + half_w < -view_padding || projected.x - half_w > width + view_padding || projected.y + half_h < -view_padding || projected.y - half_h > height + view_padding) continue;
                            let hud_alpha_multiplier = get_overlay_wall_hud_alpha_multiplier(projected.x, projected.y, half_w, half_h, width, height);
                            if (hud_alpha_multiplier <= 0.02) continue;
                            overlay_ctx.save();
                            overlay_ctx.fillStyle = wall.color;
                            overlay_ctx.strokeStyle = "rgba(0,0,0,0.35)";
                            overlay_ctx.lineWidth = 1.5;
                            overlay_ctx.globalAlpha = overlay_settings.wall_transparency * hud_alpha_multiplier;
                            overlay_ctx.beginPath();
                            overlay_ctx.rect(projected.x - half_w, projected.y - half_h, half_w * 2, half_h * 2);
                            overlay_ctx.fill();
                            overlay_ctx.stroke();
                            overlay_ctx.restore();
                        }
                        for (let blip of data.blips) {
                            let radius = Math.max(blip.size, blip.teammate || blip.observer_team ? 18 : 12);
                            let dx = Math.abs(blip.x - camera.x);
                            let dy = Math.abs(blip.y - camera.y);
                            if (dx <= Math.max(native_half_width - radius, 0) && dy <= Math.max(native_half_height - radius, 0)) continue;
                            let projected = project_world_to_screen(blip.x, blip.y, width, height, camera.x, camera.y, scale);
                            let dot_scale = overlay_settings.player_dot_scale;
                            let radius_px = Math.max(radius * scale * dot_scale, (blip.teammate || blip.observer_team ? 4.5 : 3) * dot_scale);
                            if (projected.x + radius_px < -view_padding || projected.x - radius_px > width + view_padding || projected.y + radius_px < -view_padding || projected.y - radius_px > height + view_padding) continue;
                            overlay_ctx.save();
                            overlay_ctx.fillStyle = blip.color;
                            overlay_ctx.strokeStyle = "rgba(0,0,0,0.42)";
                            overlay_ctx.lineWidth = 1.25;
                            overlay_ctx.globalAlpha = blip.teammate ? 0.9 : blip.observer_team ? 0.84 : 0.78;
                            overlay_ctx.beginPath();
                            overlay_ctx.arc(projected.x, projected.y, radius_px, 0, Math.PI * 2);
                            overlay_ctx.fill();
                            overlay_ctx.stroke();
                            overlay_ctx.restore();
                            let label_data = build_overlay_blip_labels(blip.id);
                            draw_overlay_blip_labels(overlay_ctx, label_data, projected, radius_px);
                        }
                    }

                    function overlay_loop() {
                        draw_extended_view_overlay();
                        overlay_render_loop = requestAnimationFrame(overlay_loop);
                    }

                    function handle_control_action(action, event) {
                        if (action === "close") {
                            set_control_menu_open(false);
                        } else if (action === "bots-start") {
                            send_bot_settings("start");
                        } else if (action === "bots-stop") {
                            send_control_packet({ feature: "bots", action: "stop" });
                        } else if (action === "bots-dec" || action === "bots-inc") {
                            let input = control_menu_inputs["bot-count"];
                            let next = Number.parseInt(input.value || control_menu_state.bots.count || 1, 10) + (action === "bots-inc" ? 1 : -1);
                            input.value = String(Math.max(1, next));
                            send_bot_settings();
                        } else if (action === "observers-start") {
                            send_control_packet({
                                feature: "fov",
                                action: "startObservers",
                                teamLinks: control_menu_inputs["observer-links"].value
                            });
                        } else if (action === "observers-stop") {
                            send_control_packet({ feature: "fov", action: "stopObservers" });
                        } else if (action === "teamlink-current") {
                            control_menu_inputs["teamlink-server"].value = get_teamlink_base_server_code();
                        } else if (action === "teamlink-to-view") {
                            move_found_teamlinks_to_view();
                        } else if (action === "teamlink-start") {
                            send_control_packet({
                                feature: "teamlink",
                                action: "start",
                                server: control_menu_inputs["teamlink-server"].value || get_teamlink_base_server_code()
                            });
                        } else if (action === "teamlink-stop") {
                            send_control_packet({ feature: "teamlink", action: "stop" });
                        } else if (action === "copy-teamlink") {
                            let link = event?.target?.closest?.("[data-teamlink-copy]")?.dataset.teamlinkCopy;
                            copy_teamlink_to_clipboard(link, event?.target);
                        } else if (action === "chat-spam-start") {
                            start_chat_spammer(true);
                        } else if (action === "chat-spam-stop") {
                            stop_chat_spammer();
                        } else if (action === "upgrade-send-slot") {
                            let slot = Number.parseInt(event?.target?.closest?.("[data-upgrade-slot]")?.dataset.upgradeSlot, 10);
                            if (Number.isFinite(slot) && window.packet_queue) {
                                window.packet_queue.push(new Uint8Array([85, slot]));
                            }
                        }
                    }

                    function clamp_chat_spammer_interval(value) {
                        value = Number.parseInt(value, 10);
                        if (!Number.isFinite(value)) value = 3;
                        return Math.max(1, Math.min(10, value));
                    }

                    function get_chat_spammer_message() {
                        return String(control_menu_inputs["chat-spam-message"]?.value || "").slice(0, 60);
                    }

                    function send_chat_spammer_packet() {
                        let message = chat_spammer_state.message.slice(0, 60);
                        if (!message.length || !window.packet_queue || !Array.isArray(window.packet_queue)) return false;
                        try {
                            window.packet_queue.push(packet_constructors.construct_message_packet(message));
                            return true;
                        } catch (error) {
                            return false;
                        }
                    }

                    function stop_chat_spammer() {
                        if (chat_spammer_timer) clearInterval(chat_spammer_timer);
                        chat_spammer_timer = null;
                        chat_spammer_state.running = false;
                        sync_control_menu();
                    }

                    function start_chat_spammer(send_now = true) {
                        chat_spammer_state.message = get_chat_spammer_message();
                        chat_spammer_state.interval_seconds = clamp_chat_spammer_interval(control_menu_inputs["chat-spam-interval"].value || chat_spammer_state.interval_seconds);
                        save_current_control_menu_preferences({
                            chat: {
                                ...saved_control_menu_preferences.chat,
                                message: chat_spammer_state.message,
                                interval_seconds: chat_spammer_state.interval_seconds
                            }
                        });
                        if (!chat_spammer_state.message.length) {
                            stop_chat_spammer();
                            return;
                        }
                        if (chat_spammer_timer) clearInterval(chat_spammer_timer);
                        chat_spammer_state.running = true;
                        if (send_now) send_chat_spammer_packet();
                        chat_spammer_timer = setInterval(send_chat_spammer_packet, chat_spammer_state.interval_seconds * 1000);
                        sync_control_menu();
                    }

                    function normalize_teamlink_hash(value) {
                        let text = String(value || "").trim();
                        if (!text.length) return "";
                        try {
                            if (/^https?:\/\//i.test(text)) {
                                let parsed = new URL(text);
                                text = parsed.hash ? parsed.hash.slice(1) : "";
                            }
                        } catch (error) {}
                        if (text.includes("#")) text = text.slice(text.lastIndexOf("#") + 1);
                        if (text.startsWith("#")) text = text.slice(1);
                        return text.trim().toLowerCase();
                    }

                    function get_found_teamlinks_for_view() {
                        let own_team_hash = normalize_teamlink_hash(get_current_server_code());
                        let links = [];
                        let seen = new Set();
                        for (let team of control_menu_state.teamlink.teams || []) {
                            let link = String(team?.link || "").trim();
                            let hash = normalize_teamlink_hash(link);
                            if (!hash) continue;
                            if (own_team_hash && hash === own_team_hash) continue;
                            if (seen.has(hash)) continue;
                            seen.add(hash);
                            links.push(link || `https://arras.io/#${hash}`);
                        }
                        return links;
                    }

                    function move_found_teamlinks_to_view() {
                        control_menu_inputs["observer-links"].value = get_found_teamlinks_for_view().join("\n");
                        control_menu_observer_links_edited = true;
                        switch_control_tab("fov");
                    }

                    function copy_teamlink_to_clipboard(link, button) {
                        if (!link) return;
                        let done = () => {
                            if (!button) return;
                            let previous = button.textContent;
                            button.textContent = "Copied";
                            setTimeout(() => {
                                button.textContent = previous || "Copy";
                            }, 900);
                        };
                        if (navigator.clipboard?.writeText) {
                            navigator.clipboard.writeText(link).then(done).catch(() => {
                                window.prompt("Copy:", link);
                            });
                        } else {
                            window.prompt("Copy:", link);
                            done();
                        }
                    }

                    function copy_json_to_clipboard(value, button, fallback_label) {
                        let payload = JSON.stringify(value, null, 2);
                        let done = () => {
                            if (!button) return;
                            let previous = button.textContent;
                            button.textContent = "Copied";
                            setTimeout(() => {
                                button.textContent = previous || fallback_label || "Copy";
                            }, 900);
                        };
                        if (navigator.clipboard?.writeText) {
                            navigator.clipboard.writeText(payload).then(done).catch(() => {
                                window.prompt("Copy:", payload);
                            });
                        } else {
                            window.prompt("Copy:", payload);
                            done();
                        }
                    }

                    function save_current_control_menu_preferences(overrides = {}) {
                        let next_preferences = sanitize_control_menu_preferences({
                            ...saved_control_menu_preferences,
                            bots: {
                                ...saved_control_menu_preferences.bots,

                                preset: control_menu_inputs["bot-preset"]?.value || control_menu_state.bots.preset || saved_control_menu_preferences.bots.preset || "",
                                customTankPath: "",
                                customBots: {
                                    enabled: control_menu_inputs["bot-custom-enabled"]?.checked ?? saved_control_menu_preferences.bots.customBots.enabled,
                                    mode: control_menu_inputs["bot-custom-mode-ar"]?.checked ? "ar" : "normal",
                                    tanks: control_menu_inputs["bot-custom-tanks"]?.value ?? control_menu_state.bots.customBots?.tanks ?? saved_control_menu_preferences.bots.customBots.tanks,
                                    builds: control_menu_inputs["bot-custom-builds"]?.value ?? control_menu_state.bots.customBots?.builds ?? saved_control_menu_preferences.bots.customBots.builds
                                },
                                names: control_menu_inputs["bot-names"]?.value ?? control_menu_state.bots.names ?? saved_control_menu_preferences.bots.names,
                                pathfinding: control_menu_inputs["bot-pathfinding"]?.checked ?? saved_control_menu_preferences.bots.pathfinding,
                                autofire: control_menu_inputs["bot-autofire"]?.checked ?? saved_control_menu_preferences.bots.autofire,
                                copyShooting: control_menu_inputs["bot-copy-shooting"]?.checked ?? saved_control_menu_preferences.bots.copyShooting,
                                extendedControl: control_menu_inputs["bot-extended-control"]?.checked ?? saved_control_menu_preferences.bots.extendedControl
                            },
                            focusFire: control_menu_inputs["cursor-focus"]?.checked ?? focus_fire,
                            chat: {
                                ...saved_control_menu_preferences.chat,
                                message: control_menu_inputs["chat-spam-message"]?.value ?? chat_spammer_state.message,
                                interval_seconds: control_menu_inputs["chat-spam-interval"]?.value ?? chat_spammer_state.interval_seconds
                            },
                            ...overrides
                        });
                        save_control_menu_preferences(next_preferences);
                    }

                    function send_bot_settings(action = "settings") {
                        if (action === "start") register_current_server_with_relay();
                        save_current_control_menu_preferences();
                        control_menu_state.bots = {
                            ...control_menu_state.bots,
                            count: saved_control_menu_preferences.bots.count,
                            preset: saved_control_menu_preferences.bots.preset,

                    function sync_bot_preset_select() {
                        let input = control_menu_inputs["bot-preset"];
                        if (!input) return;
                        let presets = Array.isArray(control_menu_state.bots.presets) ? control_menu_state.bots.presets : [];
                        if (!presets.length) {
                            presets = [{ id: "", label: "No presets found", valid: false }];
                        }
                        let selected = control_menu_state.bots.preset || "";
                        let active_value = input.value || selected;
                        input.textContent = "";
                        for (let preset of presets) {
                            let option = document.createElement("option");
                            option.value = preset.id;
                            option.textContent = preset.label || preset.id;
                            option.disabled = preset.valid === false;
                            if (preset.error) option.title = preset.error;
                            input.appendChild(option);
                        }
                        if (presets.some(preset => preset.id === selected && preset.valid !== false)) {
                            input.value = selected;
                        } else if (presets.some(preset => preset.id === active_value && preset.valid !== false)) {
                            input.value = active_value;
                        } else {
                            input.value = presets.find(preset => preset.valid !== false)?.id || "";
                        }
                    }

                    function sync_control_menu() {
                        if (!control_menu_panel) return;
                        control_menu_inputs["bot-count"].value = String(control_menu_state.bots.count || 1);
                        sync_bot_preset_select();
                        let custom_bots = control_menu_state.bots.customBots || saved_control_menu_preferences.bots.customBots || {};
                        control_menu_inputs["bot-custom-enabled"].checked = custom_bots.enabled === true;
                        control_menu_inputs["bot-custom-mode-ar"].checked = custom_bots.mode === "ar";

                        control_menu_inputs["wall-opacity"].value = String(Math.round(overlay_settings.wall_transparency * 100));

                        }
                        let bot_status_text = `${control_menu_state.bots.running ? "Running" : "Stopped"} · ${control_menu_state.bots.active || 0} active`;
                        if (Array.isArray(control_menu_state.bots.customTankResolution?.entries) && control_menu_state.bots.customTankResolution.entries.length) {
                            let entries = control_menu_state.bots.customTankResolution.entries;
                            bot_status_text += ` · custom ${control_menu_state.bots.customTankResolution.mode || "normal"} · ${entries.map(entry => entry.name || entry.input).join(", ")}`;
                            if (control_menu_state.bots.customTankResolution.errors?.length) {
                                bot_status_text += ` · ${control_menu_state.bots.customTankResolution.errors[0]}`;
                            }
                        } else if (control_menu_state.bots.customTankResolution?.name) {
                            bot_status_text += ` · ${control_menu_state.bots.customTankResolution.name} -> ${control_menu_state.bots.customTankResolution.path_text}`;
                        } else if (control_menu_state.bots.customTankResolution?.error) {
                            bot_status_text += ` · ${control_menu_state.bots.customTankResolution.error}`;
                        } else if (control_menu_state.bots.customTankResolution?.errors?.length) {
                            bot_status_text += ` · ${control_menu_state.bots.customTankResolution.errors[0]}`;
                        }
                        control_menu_values["bots-status"].textContent = bot_status_text;
                        control_menu_values["dot-scale"].textContent = `${Number(overlay_settings.player_dot_scale).toFixed(1)}x`;
                        control_menu_values["wall-opacity"].textContent = `${Math.round(overlay_settings.wall_transparency * 100)}%`;
                        if (document.activeElement !== control_menu_inputs["chat-spam-message"]) {
                            control_menu_inputs["chat-spam-message"].value = chat_spammer_state.message;
                        }
                        control_menu_inputs["chat-spam-interval"].value = String(chat_spammer_state.interval_seconds);
                        control_menu_values["chat-spam-interval"].textContent = `${chat_spammer_state.interval_seconds}s`;
                        control_menu_values["chat-spam-status"].textContent = chat_spammer_state.running ? "Running" : "Stopped";
                        if (control_menu_values["mapper-status"]) {
                            let mapper = control_menu_state.mapper || {};
                            control_menu_values["mapper-status"].textContent = `${mapper.running ? "Running" : "Stopped"} · ${mapper.mapped || 0} mapped · ${mapper.queued || 0} queued · ${mapper.active || 0} active`;
                        }
                        if (control_menu_values["mapper-output"]) {
                            let mapper = control_menu_state.mapper || {};
                            let output = control_menu_values["mapper-output"];
                            output.textContent = "";
                            let lines = [];
                            if (mapper.outputFile) lines.push(`file · ${mapper.outputFile}`);
                            if (mapper.terminals != null) lines.push(`terminal paths · ${mapper.terminals}`);
                            if (Array.isArray(mapper.lanes) && mapper.lanes.length) {
                                lines.push(`lanes · ${mapper.lanes.map(lane => `${lane.starter}:${lane.mapped}/${lane.queued}/${lane.active || 0}`).join(" ")}`);
                            }
                            for (let message of mapper.messages || []) lines.push(message);
                            if (!lines.length) lines.push("No mapper run yet.");
                            for (let line_text of lines.slice(-8)) {
                                let line = document.createElement("div");
                                line.className = "arras-output-line";
                                let text = document.createElement("span");
                                text.className = "arras-output-line-text";
                                text.textContent = line_text;
                                line.appendChild(text);
                                output.appendChild(line);
                            }
                        }
                        control_menu_values["observer-status"].textContent = `${control_menu_state.fov.observersRunning ? "Running" : "Stopped"} · ${control_menu_state.fov.observerCount || 0} active`;
                        let expected = Number.isFinite(control_menu_state.teamlink.expectedTeams) ? ` / ${control_menu_state.teamlink.expectedTeams}` : "";
                        control_menu_values["teamlink-status"].textContent = `${control_menu_state.teamlink.running ? "Running" : "Stopped"} · ${control_menu_state.teamlink.teams?.length || 0}${expected} found`;
                        let output = control_menu_values["teamlink-output"];
                        output.textContent = "";
                        let teams = control_menu_state.teamlink.teams || [];
                        if (teams.length) {
                            for (let team of teams) {
                                let line = document.createElement("div");
                                line.className = "arras-output-line";
                                let text = document.createElement("span");
                                text.className = "arras-output-line-text";
                                text.textContent = `${team.color_name || "team"} · ${team.players ?? "?"} players · ${team.link}`;
                                let button = document.createElement("button");
                                button.type = "button";
                                button.className = "arras-copy-button";
                                button.dataset.controlAction = "copy-teamlink";
                                button.dataset.teamlinkCopy = team.link || "";
                                button.textContent = "Copy";
                                line.append(text, button);
                                output.appendChild(line);
                            }
                        } else {
                            for (let message of control_menu_state.teamlink.messages || []) {
                                let line = document.createElement("div");
                                line.className = "arras-output-line";
                                let text = document.createElement("span");
                                text.className = "arras-output-line-text";
                                text.textContent = message;
                                line.appendChild(text);
                                output.appendChild(line);
                            }
                        }
                    }

                    function set_control_menu_open(force_state) {
                        create_control_menu();
                        let next_state = force_state === undefined ? control_menu_panel.hidden : !!force_state;
                        control_menu_panel.hidden = !next_state;
                        if (next_state) {
                            request_control_status();
                            sync_control_menu();
                        }
                    }

                    function is_control_menu_open() {
                        return !!control_menu_panel && !control_menu_panel.hidden;
                    }

                    function is_event_from_control_menu(event) {
                        return !!event?.target?.closest?.("[data-arras-control-menu]");
                    }

                    window.sync_control_menu = sync_control_menu;
                    window.is_arras_control_menu_event = is_event_from_control_menu;
                    window.is_extended_view_fov_scroll_enabled = () => overlay_enabled;

                    window.remember_extended_view_overlay_entity = remember_overlay_entity;
                    window.remember_extended_view_overlay_mockups = remember_overlay_mockup_packet;
                    window.remember_extended_view_overlay_leaderboard = remember_overlay_leaderboard_state;
                    window.remember_extended_view_overlay_player_tab = remember_overlay_player_tab_state;
                    window.refresh_extended_view_overlay_subscription = force_state => {
                        schedule_extended_view_overlay_sync(force_state === true);
                    };
                    window.release_extended_view_overlay_subscription = () => {
                        stop_overlay_subscription_keepalive();
                        release_extended_view_overlay_server_state();
                    };
                    window.toggle_extended_view_overlay = force_state => {
                        if (force_state === undefined) {
                            set_extended_view_overlay_enabled(!overlay_enabled);
                        } else {
                            set_extended_view_overlay_enabled(force_state);
                        }
                    };
                    window.toggle_extended_view_overlay_menu = force_state => {
                        set_control_menu_open(force_state);
                    };
                    window.is_extended_view_overlay_menu_open = () => is_control_menu_open();

                    let overlay_disconnect_handler = () => {
                        if (window.release_extended_view_overlay_subscription) {
                            window.release_extended_view_overlay_subscription();
                        }
                    };
                    window.addEventListener("pagehide", overlay_disconnect_handler);
                    window.addEventListener("beforeunload", overlay_disconnect_handler);
                    document.addEventListener("mousedown", handle_overlay_click_announce, true);

                    create_overlay_settings_panel();
                    if (overlay_settings.enabled) {
                        set_extended_view_overlay_enabled(true, false);
                    } else {
                        update_overlay_settings_controls();
                    }
                })();

                function toggle_extended_view_overlay() {
                    window.toggle_extended_view_overlay();
                }

                function toggle_extended_view_overlay_menu(force_state) {
                    window.toggle_extended_view_overlay_menu(force_state);
                }

                function is_extended_view_overlay_menu_open() {
                    return window.is_extended_view_overlay_menu_open ? window.is_extended_view_overlay_menu_open() : false;
                }

                function is_event_from_extended_view_overlay_menu(event) {
                    return !!window.is_arras_control_menu_event?.(event) || !!event?.target?.closest?.("[data-extended-view-settings], [data-extended-view-settings=\"true\"]");
                }
                
                document.addEventListener("wheel", function (e) {
                    if (window.is_extended_view_fov_scroll_enabled && !window.is_extended_view_fov_scroll_enabled()) return;
                    e.preventDefault();
                    if (modified_cam.use_camera) {
                        if (e.deltaY < 0) {
                            modified_cam.fov -= modified_cam.fov_speed;
                            if (modified_cam.fov < modified_cam.min_value) modified_cam.fov = modified_cam.min_value;
                        } else {
                            modified_cam.fov += modified_cam.fov_speed;
                            if (modified_cam.fov > modified_cam.max_value) modified_cam.fov = modified_cam.max_value;
                        };
                    } else {
                        if (e.deltaY < 0) {
                            modified_cam.zoom_multiplier = Math.max(modified_cam.min_zoom_multiplier, modified_cam.zoom_multiplier * (1 - modified_cam.zoom_step));
                        } else {
                            modified_cam.zoom_multiplier = Math.min(modified_cam.max_zoom_multiplier, modified_cam.zoom_multiplier * (1 + modified_cam.zoom_step));
                        };
                    };
                    if (window.refresh_extended_view_overlay_subscription) {
                        window.refresh_extended_view_overlay_subscription();
                    }
                }, { passive: false });
            }
            )()
        </script>
